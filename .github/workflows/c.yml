name: Build firmware and upload artifact

on:
  push: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PIO_ENV: 0_13_X   # <- 改成你的 platformio env 名稱

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache PlatformIO and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Build firmware
        run: |
          pio run -e $PIO_ENV

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.PIO_ENV }}-${{ github.sha }}
          path: .pio/build/${{ env.PIO_ENV }}/*.bin
          retention-days: 7
